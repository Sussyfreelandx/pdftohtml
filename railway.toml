# ── Railway.app Deployment Configuration ──────────────────────────
# Railway auto-detects the Dockerfile and uses it to build + run.
# This file configures deployment behavior and health checks.
# ──────────────────────────────────────────────────────────────────

[build]
# Use the Dockerfile in the repo root (installs Chromium + poppler-utils)
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Start command (also defined in Dockerfile CMD, but explicit here for clarity)
startCommand = "node src/start.js"

# Health check — Railway pings this endpoint to confirm the service is running
healthcheckPath = "/health"
healthcheckTimeout = 30

# Restart policy — auto-restart if the process crashes
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Number of instances
numReplicas = 1
